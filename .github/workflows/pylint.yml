name: Pylint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install pylint
      run: pip install pylint

    - name: Lint completed source and projects
      run: |
        pylint --rcfile=.pylintrc src/01_python_basics src/02_variables src/03_data_types projects/beginner/calculator/calculator.py projects/beginner/number_guessing_game/game.py
